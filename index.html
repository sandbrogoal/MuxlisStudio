<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muxlis Studio - Premium Services</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <!-- Animate.css for entrance animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0A0A0A] text-white antialiased font-sans flex flex-col items-center">

    <div class="w-full max-w-[440px] px-6 py-12 flex flex-col gap-10 animate__animated animate__fadeIn">
        
        <!-- Header -->
        <header class="text-center flex flex-col items-center gap-4">
            <div class="inline-block px-3 py-1 border border-white/20 rounded-full text-[10px] uppercase tracking-[0.2em] font-semibold text-white/60 animate__animated animate__fadeInDown">
                Muxlis Studio Presents
            </div>
            <h1 class="font-serif text-5xl font-light italic tracking-tight animate__animated animate__fadeInDown animate__delay-1s">
                Muxlis <span class="gold-text not-italic font-bold">Studio</span>
            </h1>
            <p class="text-white/40 text-sm tracking-widest uppercase italic animate__animated animate__fadeIn animate__delay-2s">Digital Agency Services</p>
        </header>

        <!-- Tab Switcher -->
        <div class="flex bg-white/[0.03] p-1.5 rounded-2xl border border-white/5 shadow-2xl animate__animated animate__fadeInUp animate__delay-1s">
            <button onclick="switchTab('start')" id="tab-start" class="tab-btn flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-xs font-semibold uppercase tracking-wider transition-all relative text-black bg-white">
                <i data-lucide="rocket" class="w-4 h-4"></i> Start
            </button>
            <button onclick="switchTab('pro')" id="tab-pro" class="tab-btn flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-xs font-semibold uppercase tracking-wider transition-all relative text-white/40">
                <i data-lucide="star" class="w-4 h-4"></i> Pro
            </button>
            <button onclick="switchTab('vip')" id="tab-vip" class="tab-btn flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-xs font-semibold uppercase tracking-wider transition-all relative text-white/40">
                <i data-lucide="crown" class="w-4 h-4"></i> VIP
            </button>
        </div>

        <!-- Package Content -->
        <div id="package-content" class="flex flex-col gap-10">
            <!-- Content will be injected by JavaScript -->
        </div>

        <!-- Team Section -->
        <section class="flex flex-col gap-6 animate__animated animate__fadeIn animate__delay-3s">
            <div class="flex flex-col items-center gap-4">
                <h2 class="text-[10px] uppercase tracking-[0.4em] text-white/20 font-bold leading-none">Siz bilan ishlaydigan jamoa</h2>
                <div id="team-list" class="flex flex-wrap justify-center gap-2.5">
                    <!-- Team injected by JS -->
                </div>
            </div>
        </section>

        <!-- CTA Footer -->
        <footer class="fixed bottom-6 w-full max-w-[440px] px-6 left-1/2 -translate-x-1/2 z-50">
            <div class="animate__animated animate__slideInUp animate__delay-2s">
                <button onclick="window.open('https://t.me/MuxlisaPulatova', '_blank')" class="w-full relative group shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                    <div class="absolute -inset-0.5 bg-gradient-to-r from-[#D4AF37] to-[#A67C00] rounded-2xl blur opacity-30"></div>
                    <div class="relative bg-white text-black font-bold h-16 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-transform overflow-hidden">
                        <span class="uppercase tracking-[0.2em] text-xs">Ushbu tarifni band qilish</span>
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                        
                        <!-- Shine Effect -->
                        <div class="absolute inset-0 bg-white/40 -translate-x-[100%] group-hover:translate-x-[100%] transition-transform duration-700 skew-x-[-20deg]"></div>
                    </div>
                </button>
                <div class="flex justify-center items-center gap-2 mt-4 bg-[#0A0A0A]/50 backdrop-blur-sm py-1 rounded-full">
                    <i data-lucide="check-circle-2" class="w-3 h-3 text-[#D4AF37]"></i>
                    <span class="text-[9px] text-white/20 uppercase tracking-[0.2em] font-bold">100% Sifat va Natija Kafolatlangan</span>
                </div>
            </div>
        </footer>

    </div>

    <!-- Background Elements -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#D4AF37]/5 blur-[150px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#A67C00]/5 blur-[150px] rounded-full"></div>
    </div>

    <script>
        const packages = {
            start: {
                name: "Start",
                price: "500",
                desc: "Kichik bizneslar va startaplar uchun ideal boshlanish",
                services: [
                    { icon: "instagram", title: "Instagram upakovka", desc: "Profilni ochish va professional brend holatiga keltirish" },
                    { icon: "target", title: "SMM Strategiya", desc: "Mukammal rejalashtirish va kreativ yondashuv" },
                    { icon: "sparkles", title: "5 ta AI Video", desc: "Sun'iy intellekt yordamida yaratilgan kreativ videolar" },
                    { icon: "video", title: "5 ta Jonli Reels", desc: "Brend egasi ishtirokidagi professional Reelslar" },
                    { icon: "zap", title: "Target Video", desc: "Sotuvga yo'naltirilgan 1 ta maxsus target video" },
                    { icon: "clock", title: "1 oylik qo'llab-quvvatlash", desc: "Doimiy aloqa va natijalar monitoringi" }
                ]
            },
            pro: {
                name: "Pro",
                price: "800",
                desc: "Professional brending va rivojlangan SMM strategiya",
                services: [
                    { icon: "instagram", title: "Instagram upakovka", desc: "Profilni ochish va professional brend holatiga keltirish" },
                    { icon: "target", title: "Brend Ustida Ishlash", desc: "Ranglar, shriftlar va professional dizayn tizimi" },
                    { icon: "sparkles", title: "5 ta AI Video", desc: "Sun'iy intellekt yordamida yaratilgan kreativ videolar" },
                    { icon: "users", title: "5 ta Ma'lumotli Post", desc: "Mahsulot haqida to'liq va foydali ma'lumotlar" },
                    { icon: "video", title: "5 ta Jonli Reels", desc: "Brend egasi ishtirokidagi professional Reelslar" },
                    { icon: "zap", title: "1 ta Target Video", desc: "$100 xarajatni ichiga oluvchi professional video" },
                    { icon: "sparkles", title: "Har kuni 3-4 ta Story", desc: "Doimiy aktivlik va mijozlar bilan muloqot" }
                ]
            },
            vip: {
                name: "VIP",
                price: "1500",
                desc: "YouTube prodakshn, Podcast va Muxlisa Po'latovadan shaxsiy strategik tahlil",
                services: [
                    { icon: "instagram", title: "Instagram upakovka", desc: "Brend ustida kuchli ishlash (rang, shrift, dizayn)" },
                    { icon: "youtube", title: "YouTube upakovka", desc: "Kanalni ochish va professional brending" },
                    { icon: "mic", title: "1 soatlik Podcast", desc: "Professional darajadagi 1 ta kontent podcast" },
                    { icon: "sparkles", title: "7 ta AI Video", desc: "Trenddagi eng so'nggi AI videolar" },
                    { icon: "users", title: "7 ta Ma'lumotli Post", desc: "Mahsulot haqida mukammal tushuntirishlar" },
                    { icon: "video", title: "10 ta Jonli Reels", desc: "Brend egasi bilan doimiy va sifatli Reelslar" },
                    { icon: "zap", title: "2 ta Target Video", desc: "$150 xarajatni ichiga oluvchi reklama videolari" },
                    { icon: "star", title: "Muxlisa Po'latova", desc: "Har 15 kunda brendni tahlil qilish va strategik maslahatlar" }
                ]
            }
        };

        const team = [
            { role: "Muxlisa Po'latova", icon: "star" },
            { role: "AI xodim", icon: "sparkles" },
            { role: "SMM xodim", icon: "users" },
            { role: "Targetolog", icon: "target" },
            { role: "Storiesmeyker", icon: "instagram" }
        ];

        function switchTab(tabId) {
            // Update Tab UI
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('text-black', 'bg-white');
                btn.classList.add('text-white/40');
            });
            const activeBtn = document.getElementById('tab-' + tabId);
            activeBtn.classList.remove('text-white/40');
            activeBtn.classList.add('text-black', 'bg-white');

            // Update Content
            const pkg = packages[tabId];
            const contentDiv = document.getElementById('package-content');
            
            let servicesHTML = pkg.services.map((s, i) => `
                <div class="flex gap-4 items-center p-3.5 rounded-2xl border border-white/5 bg-white/[0.02] hover:bg-white/[0.05] transition-all hover:translate-x-1 animate__animated animate__fadeInRight" style="animation-delay: ${i * 0.1}s">
                    <div class="p-2.5 rounded-xl bg-white/[0.03] border border-white/10 text-[#D4AF37]">
                        <i data-lucide="${s.icon}" class="w-5 h-5"></i>
                    </div>
                    <div class="flex flex-col gap-0.5">
                        <h3 class="font-semibold text-sm text-white/90 underline decoration-white/10 underline-offset-4">${s.title}</h3>
                        <p class="text-[11px] text-white/30">${s.desc}</p>
                    </div>
                </div>
            `).join('');

            contentDiv.innerHTML = `
                <div class="relative premium-gradient rounded-3xl p-8 border border-white/10 flex flex-col items-center gap-6 text-center shadow-2xl animate__animated animate__zoomIn">
                    <div class="flex items-center gap-2 text-[#D4AF37]">
                        <i data-lucide="star" class="w-4 h-4 fill-[#D4AF37]"></i>
                        <span class="uppercase text-[11px] font-bold tracking-[0.3em]">${pkg.name} Tarifi</span>
                        <i data-lucide="star" class="w-4 h-4 fill-[#D4AF37]"></i>
                    </div>
                    <div class="flex flex-col gap-1">
                        <div class="text-6xl font-serif font-bold italic">$${pkg.price}</div>
                    </div>
                    <div class="h-px w-full bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
                    <p class="text-xs text-white/50 leading-relaxed">${pkg.desc}</p>
                </div>
                <section class="flex flex-col gap-3">
                    <h2 class="text-[10px] uppercase tracking-[0.4em] text-white/20 font-bold mb-1 ml-1 leading-none">Paket tarkibi</h2>
                    ${servicesHTML}
                </section>
            `;
            
            lucide.createIcons();
        }

        // Initialize Team
        function initTeam() {
            const teamList = document.getElementById('team-list');
            teamList.innerHTML = team.map(member => `
                <div class="flex items-center gap-2 px-4 py-2 bg-white/[0.03] border border-white/5 rounded-full">
                    <div class="text-[#D4AF37]/60"><i data-lucide="${member.icon}" class="w-4 h-4"></i></div>
                    <span class="text-[10px] font-semibold text-white/50 uppercase tracking-widest">${member.role}</span>
                </div>
            `).join('');
            lucide.createIcons();
        }

        switchTab('start');
        initTeam();
    </script>
</body>
</html>
